name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  structure:
    name: Verify course structure
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Every lesson and topic must have a README
        run: |
          missing=0
          for dir in $(find lessons topics -mindepth 1 -maxdepth 1 -type d | sort); do
            if [ ! -f "$dir/README.md" ]; then
              echo "::error::Missing README.md in $dir"
              missing=1
            fi
          done
          echo "Checked $(find lessons topics -mindepth 1 -maxdepth 1 -type d | wc -l) modules."
          exit $missing
